name: tests

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4']

    name: Test - PHP ${{ matrix.php }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, sqlite3, pdo_sqlite
          coverage: none

      - name: Cache Composer files
        uses: actions/cache@v4
        with:
          path: ~/.cache/composer/files
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.json') }}
          restore-keys: composer-${{ matrix.php }}-

      # Retry on a transient Packagist outage (HTTP 502/504 on the metadata CDN) instead of failing the build.
      - name: Install dependencies
        run: |
          for attempt in 1 2 3; do
            composer update --prefer-dist --no-interaction --no-progress && exit 0
            echo "::warning::composer update failed (attempt $attempt/3) — retrying in 15s (transient Packagist outage?)"
            sleep 15
          done
          exit 1

      - name: Run tests
        run: composer test

  analyse:
    runs-on: ubuntu-latest
    name: Static analysis (Larastan)

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, sqlite3, pdo_sqlite
          coverage: none

      - name: Cache Composer files
        uses: actions/cache@v4
        with:
          path: ~/.cache/composer/files
          key: composer-8.4-${{ hashFiles('composer.json') }}
          restore-keys: composer-8.4-

      # Retry on a transient Packagist outage (HTTP 502/504 on the metadata CDN) instead of failing the build.
      - name: Install dependencies
        run: |
          for attempt in 1 2 3; do
            composer update --prefer-dist --no-interaction --no-progress && exit 0
            echo "::warning::composer update failed (attempt $attempt/3) — retrying in 15s (transient Packagist outage?)"
            sleep 15
          done
          exit 1

      - name: Run Larastan
        run: composer analyse

  js:
    runs-on: ubuntu-latest
    name: JS tests (Vitest)

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run JS tests
        run: npm test
